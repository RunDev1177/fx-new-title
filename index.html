<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตารางข้อมูลข่าวสาร</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f3f4f6; 
        }
        .table-container::-webkit-scrollbar {
            height: 6px;
        }
        .table-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="antialiased text-gray-800">

    <div class="container mx-auto px-4 py-10 max-w-4xl">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">ตารางข้อมูลข่าวสาร</h1>
        </header>

        <div id="status-message" class="flex justify-center items-center py-20">
            <div class="flex flex-col items-center">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
                <p class="mt-4 text-gray-500">กำลังดึงข้อมูล...</p>
            </div>
        </div>

        <div id="table-wrapper" class="hidden overflow-hidden bg-white shadow-xl rounded-2xl border border-gray-200">
            <div class="table-container overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr id="table-header-row">
                            <!-- หัวข้อตารางจะถูกเติมอัตโนมัติ -->
                        </tr>
                    </thead>
                    <tbody id="data-body" class="bg-white divide-y divide-gray-100">
                    </tbody>
                </table>
            </div>
        </div>
        
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwN1m5Kulp9qbn_XTuHywFdqWTcRKGjhvrPd5hH1ZUWUOWutFi9p69QL3Gics3JfYZR_w/exec';

        async function loadTableData() {
            const statusMessage = document.getElementById('status-message');
            const tableWrapper = document.getElementById('table-wrapper');
            const dataBody = document.getElementById('data-body');
            const headerRow = document.getElementById('table-header-row');

            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();

                if (data.error) throw new Error(data.error);
                if (data.length === 0) {
                    statusMessage.innerHTML = '<p class="text-orange-500">ไม่พบข้อมูลในตาราง</p>';
                    return;
                }

                // ดึงรายชื่อหัวตารางทั้งหมดจากข้อมูลแถวแรก
                const keys = Object.keys(data[0]);
                
                // สร้างหัวตาราง (Header) อัตโนมัติจาก Keys ที่ได้มา
                headerRow.innerHTML = keys.slice(0, 2).map(key => `
                    <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
                        ${key}
                    </th>
                `).join('');

                // เติมข้อมูลลงในตาราง
                dataBody.innerHTML = '';
                data.forEach(item => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-blue-50 transition-colors duration-150';
                    
                    // ดึงเฉพาะ 2 คอลัมน์แรกมาแสดง ไม่ว่าจะชื่ออะไรก็ตาม
                    const col1 = item[keys[0]] || '-';
                    const col2 = item[keys[1]] || '-';

                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-normal text-sm font-medium text-gray-900 border-r border-gray-50 w-1/3">
                            ${col1}
                        </td>
                        <td class="px-6 py-4 whitespace-normal text-sm text-gray-600">
                            ${col2}
                        </td>
                    `;
                    dataBody.appendChild(row);
                });

                statusMessage.classList.add('hidden');
                tableWrapper.classList.remove('hidden');

            } catch (error) {
                console.error('Fetch Error:', error);
                statusMessage.innerHTML = `<p class="text-red-500">เกิดข้อผิดพลาด: ${error.message}</p>`;
            }
        }

        window.onload = loadTableData;
    </script>
</body>
</html>
